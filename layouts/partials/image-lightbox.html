{{- $scopeSelector := .scopeSelector | default ".js-lightbox-scope" -}}

<div data-lightbox-overlay
     class="fixed inset-0 z-[120] hidden items-center justify-center bg-[color:rgba(2,6,18,0.88)] p-4">
    <button type="button"
            data-lightbox-close
            aria-label="Close image preview"
            class="absolute right-4 top-4 inline-flex h-10 w-10 items-center justify-center rounded-full border border-[color:rgba(255,255,255,0.25)] bg-[color:rgba(0,0,0,0.45)] text-[1.35rem] leading-none text-white transition duration-150 hover:bg-[color:rgba(0,0,0,0.65)]">
        ×
    </button>
    <figure class="m-0 max-h-full max-w-full">
        <img data-lightbox-image
             class="mx-auto block h-auto max-h-[88vh] max-w-[92vw] rounded-[12px] border border-[color:rgba(255,255,255,0.22)] shadow-[0_20px_40px_rgba(0,0,0,0.45)]"
             src=""
             alt=""/>
        <figcaption data-lightbox-caption
                    class="mt-3 text-center text-[0.85rem] text-[color:rgba(255,255,255,0.84)]"></figcaption>
    </figure>
</div>

<script>
    (() => {
        const scope = document.querySelector('{{ $scopeSelector }}');
        const overlay = document.querySelector('[data-lightbox-overlay]');
        const overlayImage = overlay ? overlay.querySelector('[data-lightbox-image]') : null;
        const overlayCaption = overlay ? overlay.querySelector('[data-lightbox-caption]') : null;

        if (!scope || !overlay || !overlayImage || !overlayCaption) {
            return;
        }

        const isEligibleImage = (img) => {
            return !!img
                && scope.contains(img)
                && !img.closest('[data-no-lightbox]')
                && img.getAttribute('data-lightbox') !== 'off';
        };

        const setImageHintCursor = () => {
            scope.querySelectorAll('img').forEach((img) => {
                if (isEligibleImage(img)) {
                    img.style.cursor = 'zoom-in';
                }
            });
        };

        const openLightbox = (img) => {
            const fullSrc = img.getAttribute('data-lightbox-src') || img.currentSrc || img.src;
            const caption = img.getAttribute('data-lightbox-caption') || img.alt || '';
            overlayImage.src = fullSrc;
            overlayImage.alt = img.alt || '';
            overlayCaption.textContent = caption;
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            document.body.style.overflow = 'hidden';
        };

        const closeLightbox = () => {
            overlay.classList.remove('flex');
            overlay.classList.add('hidden');
            overlayImage.src = '';
            overlayCaption.textContent = '';
            document.body.style.overflow = '';
        };

        scope.addEventListener('click', (event) => {
            const img = event.target.closest('img');
            if (!isEligibleImage(img)) {
                return;
            }
            event.preventDefault();
            openLightbox(img);
        });

        overlay.addEventListener('click', (event) => {
            if (event.target === overlay || event.target.closest('[data-lightbox-close]')) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && !overlay.classList.contains('hidden')) {
                closeLightbox();
            }
        });

        setImageHintCursor();
    })();
</script>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.author.statement }}{{ . }}{{ else }}Personal website and blog{{ end }}{{ end }}"/>
<meta name="color-scheme" content="dark light"/>
<link rel="apple-touch-icon" sizes="180x180" href="{{ "images/favicon/apple-touch-icon.png" | relURL }}"/>
<link rel="icon" type="image/png" sizes="32x32" href="{{ "images/favicon/favicon-32x32.png" | relURL }}"/>
<link rel="icon" type="image/png" sizes="16x16" href="{{ "images/favicon/favicon-16x16.png" | relURL }}"/>
<link rel="shortcut icon" href="{{ "images/favicon/favicon.ico" | relURL }}"/>
<link rel="manifest" href="{{ "images/favicon/site.webmanifest" | relURL }}"/>
<script>
    (function () {
        var saved = null;
        try {
            saved = localStorage.getItem("wilderyns-theme");
        } catch (e) {
        }
        var theme = (saved === "light" || saved === "dark") ? saved : "dark";
        document.documentElement.setAttribute("data-theme", theme);
    })();
</script>
{{- $main := resources.Get "css/main.css" | css.PostCSS (dict "config" "postcss.config.js") -}}
{{- $chroma := resources.Get "css/chroma.css" -}}
{{- $css := slice $main $chroma | resources.Concat "css/main.css" | minify | fingerprint -}}
<link rel="stylesheet" href="{{ $css.RelPermalink }}"/>
